<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Lumière Dorée</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon_1.svg" />
  <style>
    :root {
      --noir: #0a0a0a;
      --or: #c9a84c;
      --or-clair: #e8cc7e;
      --creme: #f5f0e8;
      --gris: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: var(--creme);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* NAV */
    .admin-nav {
      background: #111;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--or);
      letter-spacing: 0.2em;
    }
    .admin-logo span { font-style: italic; color: var(--or-clair); }
    .admin-logo small {
      display: block;
      font-family: 'Raleway', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gris);
      text-transform: uppercase;
    }
    .btn-deconnexion {
      background: none;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gris);
      padding: 0.5rem 1.2rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-deconnexion:hover { border-color: var(--or); color: var(--or); }

    /* CONTENU */
    .admin-contenu {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 2rem;
    }
    .section-titre {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--creme);
      margin-bottom: 1.5rem;
    }
    .section-titre em { color: var(--or); font-style: italic; }

    /* FORMULAIRE */
    .formulaire {
      background: #111;
      border: 1px solid rgba(201,168,76,0.15);
      padding: 2rem;
      margin-bottom: 3rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.plein { grid-column: 1 / -1; }
    .form-group label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--gris);
      text-transform: uppercase;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      background: #0a0a0a;
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--creme);
      padding: 0.8rem 1rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.3s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--or); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select { cursor: pointer; }
    .form-group select option { background: #111; }

    /* IMAGE OPTIONS */
    .image-options {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }
    .img-option {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--gris);
      background: #0a0a0a;
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
      text-transform: uppercase;
    }
    .img-option.actif {
      border-color: var(--or);
      color: var(--or);
      background: rgba(201,168,76,0.05);
    }
    .img-zone { display: none; }
    .img-zone.visible { display: block; }

    .preview-wrap { margin-top: 0.8rem; display: none; }
    .preview-wrap.visible { display: block; }
    .preview-wrap img {
      height: 100px;
      border: 1px solid rgba(201,168,76,0.2);
      object-fit: cover;
    }

    .upload-zone {
      border: 1px dashed rgba(201,168,76,0.3);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--or); background: rgba(201,168,76,0.03); }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-zone p { color: var(--gris); font-size: 0.85rem; }
    .upload-zone span { color: var(--or); font-size: 0.75rem; display: block; margin-top: 0.3rem; }
    .upload-progress { margin-top: 0.5rem; font-size: 0.8rem; color: var(--or); display: none; }

    /* BOUTONS */
    .btn-ajouter {
      background: var(--or);
      color: var(--noir);
      border: none;
      padding: 0.9rem 2.5rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-ajouter:hover { background: var(--or-clair); }
    .btn-ajouter:disabled { opacity: 0.5; cursor: not-allowed; }

    .message-succes {
      color: #2ecc71;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }
    .message-succes.visible { display: block; }

    /* TABLE */
    .produits-table { width: 100%; border-collapse: collapse; }
    .produits-table th {
      text-align: left;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--or);
      text-transform: uppercase;
      padding: 1rem;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      font-weight: 400;
    }
    .produits-table td {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.85rem;
      color: var(--creme);
      vertical-align: middle;
    }
    .produit-img-mini {
      width: 50px; height: 50px;
      object-fit: cover;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .btn-supprimer {
      background: none;
      border: 1px solid rgba(231,76,60,0.4);
      color: #e74c3c;
      padding: 0.4rem 0.9rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }
    .btn-supprimer:hover { background: #e74c3c; color: white; }
    .btn-modifier {
      background: none;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--or);
      padding: 0.4rem 0.9rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }
    .btn-modifier:hover { background: var(--or); color: var(--noir); }
    .btn-dispo {
      border: none;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      font-weight: 500;
    }
    .btn-dispo.oui {
      background: rgba(46,204,113,0.15);
      color: #2ecc71;
      border: 1px solid rgba(46,204,113,0.3);
    }
    .btn-dispo.oui:hover { background: #2ecc71; color: white; }
    .btn-dispo.non {
      background: rgba(231,76,60,0.15);
      color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.3);
    }
    .btn-dispo.non:hover { background: #e74c3c; color: white; }

    /* MODALE MODIFIER */
    #modal-modifier {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    #modal-modifier.actif { display: flex; }
    .modal-modifier-contenu {
      background: #111;
      border: 1px solid rgba(201,168,76,0.2);
      padding: 2.5rem;
      width: 100%;
      max-width: 600px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-modifier-titre {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--creme);
      margin-bottom: 1.5rem;
    }
    .modal-modifier-titre em { color: var(--or); font-style: italic; }
    .modal-fermer-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--or);
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .modal-fermer-btn:hover { background: var(--or); color: var(--noir); }
    .btn-sauvegarder {
      background: var(--or);
      color: var(--noir);
      border: none;
      padding: 0.9rem 2rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
      width: 100%;
    }
    .btn-sauvegarder:hover { background: var(--or-clair); }
    .modal-form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .modal-form-group label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--gris);
      text-transform: uppercase;
    }
    .modal-form-group input,
    .modal-form-group select,
    .modal-form-group textarea {
      background: #0a0a0a;
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--creme);
      padding: 0.8rem 1rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.3s;
      width: 100%;
    }
    .modal-form-group input:focus,
    .modal-form-group select:focus,
    .modal-form-group textarea:focus { border-color: var(--or); }
    .modal-form-group textarea { resize: vertical; min-height: 80px; }
    .modal-form-group select option { background: #111; }

    /* ===========================
   DASHBOARD RESPONSIVE MOBILE
=========================== */
@media (max-width: 768px) {

  /* NAV */
  .admin-nav {
    padding: 1rem 1.5rem;
  }
  .admin-logo {
    font-size: 1.1rem;
  }

  /* CONTENU */
  .admin-contenu {
    padding: 0 1rem;
    margin: 1.5rem auto;
  }

  /* FORMULAIRE */
  .form-grid {
    grid-template-columns: 1fr;
  }
  .form-group.plein {
    grid-column: 1;
  }
  .formulaire {
    padding: 1.5rem 1rem;
  }

  /* TABLE → CARTES */
  .produits-table thead {
    display: none;
  }
  .produits-table,
  .produits-table tbody,
  .produits-table tr,
  .produits-table td {
    display: block;
    width: 100%;
  }
  .produits-table tr {
    background: #111;
    border: 1px solid rgba(201,168,76,0.15);
    margin-bottom: 1rem;
    padding: 1rem;
    position: relative;
  }
  .produits-table td {
    padding: 0.4rem 0;
    border: none;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .produits-table td::before {
    content: attr(data-label);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--or);
    text-transform: uppercase;
    min-width: 90px;
  }
  .produit-img-mini {
    width: 60px;
    height: 60px;
  }

  /* BOUTONS ACTIONS */
  .produits-table td:last-child {
    margin-top: 0.5rem;
    gap: 0.5rem;
  }

  /* MODALE MODIFIER */
  .modal-modifier-contenu {
    padding: 1.5rem 1rem;
    margin: 1rem;
  }
}

@media (max-width: 480px) {
  .btn-deconnexion {
    font-size: 0.65rem;
    padding: 0.4rem 0.8rem;
  }
  .btn-ajouter {
    width: 100%;
    text-align: center;
  }
}
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="admin-nav">

      <small>Administration</small>
    </div>
    <button class="btn-deconnexion" onclick="seDeconnecter()">Déconnexion</button>
  </nav>

  <!-- CONTENU -->
  <div class="admin-contenu">

  <!-- MODALE MODIFIER -->
  <div id="modal-modifier">
    <div class="modal-modifier-contenu">
      <button class="modal-fermer-btn" onclick="fermerModifier()">✕</button>
      <h3 class="modal-modifier-titre">Modifier un <em>produit</em></h3>
      <input type="hidden" id="m-id" />
      <div class="modal-form-group">
        <label>Nom du produit</label>
        <input type="text" id="m-nom" />
      </div>
      <div class="modal-form-group">
        <label>Catégorie</label>
        <select id="m-categorie">
        <option value="">-- Choisir une catégorie --</option>
        <option value="Hygiène & Soins Corporels">🧴 Hygiène & Soins Corporels</option>
        <option value="Beauté & Cosmétique">✨ Beauté & Cosmétique</option>
        <option value="Santé & Bien-être">💊 Santé & Bien-être</option>
        <option value="Produits Bébé">👶 Produits Bébé</option>
        <option value="Maison & Quotidien">🏠 Maison & Quotidien</option>
        <option value="Produits Hommes">👔 Produits Hommes</option>
        <option value="Produits Femmes">❤️ Produits Femmes</option>
        <option value="Hygiène Bucco-dentaire">🦷 Hygiène Bucco-dentaire</option>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Vérifier connexion Supabase Auth
async function verifierAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    window.location.href = "admin.html";
  }
}
verifierAuth();

function seDeconnecter() {
  supabaseClient.auth.signOut();
  window.location.href = "admin.html";
}

    let modeImage = "url";

    function changerOption(mode, event) {
      modeImage = mode;
      document.querySelectorAll(".img-option").forEach(el => el.classList.remove("actif"));
      event.target.classList.add("actif");
      document.getElementById("zone-url").classList.toggle("visible", mode === "url");
      document.getElementById("zone-fichier").classList.toggle("visible", mode === "fichier");
      document.getElementById("preview-wrap").classList.remove("visible");
    }

    function previewUrl() {
      const url = document.getElementById("f-image-url").value.trim();
      if (url) {
        document.getElementById("preview-img").src = url;
        document.getElementById("preview-wrap").classList.add("visible");
      } else {
        document.getElementById("preview-wrap").classList.remove("visible");
      }
    }

    function previewFichier() {
      const fichier = document.getElementById("f-image-fichier").files[0];
      if (!fichier) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById("preview-img").src = e.target.result;
        document.getElementById("preview-wrap").classList.add("visible");
      };
      reader.readAsDataURL(fichier);
    }

    async function uploadImage() {
      const fichier = document.getElementById("f-image-fichier").files[0];
      if (!fichier) return null;
      const nomFichier = `${Date.now()}_${fichier.name.replace(/\s/g, "_")}`;
      document.getElementById("upload-progress").style.display = "block";
      const { data, error } = await supabaseClient.storage
        .from("produits")
        .upload(nomFichier, fichier, { upsert: true });
      document.getElementById("upload-progress").style.display = "none";
      if (error) { alert("Erreur upload : " + error.message); return null; }
      const { data: urlData } = supabaseClient.storage
        .from("produits")
        .getPublicUrl(nomFichier);
      return urlData.publicUrl;
    }

    async function ajouterProduit() {
      const nom = document.getElementById("f-nom").value.trim();
      const categorie = document.getElementById("f-categorie").value;
      const prix = parseInt(document.getElementById("f-prix").value);
      const description = document.getElementById("f-description").value.trim();

      if (!nom || !categorie || !prix) {
        alert("Remplis les champs obligatoires : Nom, Catégorie, Prix !");
        return;
      }

      const btn = document.getElementById("btn-ajouter");
      btn.disabled = true;
      btn.textContent = "En cours...";

      let image_url = "";
      if (modeImage === "url") {
        image_url = document.getElementById("f-image-url").value.trim();
      } else {
        image_url = await uploadImage() || "";
      }

      const { error } = await supabaseClient
        .from("produits")
        .insert([{ nom, categorie, prix, image_url, description, disponible: true }]);

      btn.disabled = false;
      btn.textContent = "+ Ajouter le produit";

      if (error) { alert("Erreur : " + error.message); return; }

      document.getElementById("f-nom").value = "";
      document.getElementById("f-categorie").value = "";
      document.getElementById("f-prix").value = "";
      document.getElementById("f-image-url").value = "";
      document.getElementById("f-image-fichier").value = "";
      document.getElementById("f-description").value = "";
      document.getElementById("preview-wrap").classList.remove("visible");

      const msg = document.getElementById("msg-succes");
      msg.classList.add("visible");
      setTimeout(() => msg.classList.remove("visible"), 3000);

      chargerProduits();
    }

    function ouvrirModifier(id) {
      const p = window.produitsAdmin.find(p => p.id === id);
      if (!p) return;
      document.getElementById("m-id").value = p.id;
      document.getElementById("m-nom").value = p.nom;
      document.getElementById("m-categorie").value = p.categorie;
      document.getElementById("m-prix").value = p.prix;
      document.getElementById("m-image").value = p.image_url || "";
      document.getElementById("m-description").value = p.description || "";
      document.getElementById("modal-modifier").classList.add("actif");
    }

    function fermerModifier() {
      document.getElementById("modal-modifier").classList.remove("actif");
    }

    async function sauvegarderModif() {
      const id = parseInt(document.getElementById("m-id").value);
      const nom = document.getElementById("m-nom").value.trim();
      const categorie = document.getElementById("m-categorie").value;
      const prix = parseInt(document.getElementById("m-prix").value);
      const image_url = document.getElementById("m-image").value.trim();
      const description = document.getElementById("m-description").value.trim();

      if (!nom || !categorie || !prix) {
        alert("Remplis tous les champs obligatoires !");
        return;
      }

      const { error } = await supabaseClient
        .from("produits")
        .update({ nom, categorie, prix, image_url, description })
        .eq("id", id);

      if (error) { alert("Erreur : " + error.message); return; }
      fermerModifier();
      chargerProduits();
    }

    async function toggleDispo(id, dispoActuel) {
      const { error } = await supabaseClient
        .from("produits")
        .update({ disponible: !dispoActuel })
        .eq("id", id);
      if (error) { alert("Erreur : " + error.message); return; }
      chargerProduits();
    }

    async function supprimerProduit(id) {
      if (!confirm("Supprimer ce produit ?")) return;
      const { error } = await supabaseClient
        .from("produits")
        .delete()
        .eq("id", id);
      if (error) { alert("Erreur : " + error.message); return; }
      chargerProduits();
    }

    async function chargerProduits() {
      const { data: produits, error } = await supabaseClient
        .from("produits")
        .select("*")
        .order("id", { ascending: false });

      if (error) { console.error(error); return; }

      window.produitsAdmin = produits;
      const tbody = document.getElementById("liste-admin");

      if (!produits || produits.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--gris);padding:2rem">Aucun produit</td></tr>`;
        return;
      }

      tbody.innerHTML = produits.map(p => `
  <tr>
    <td data-label="Image">
      ${p.image_url
        ? `<img src="${p.image_url}" class="produit-img-mini" />`
        : `<div style="width:50px;height:50px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:var(--or)">&#9672;</div>`
      }
    </td>
    <td data-label="Nom">${p.nom}</td>
    <td data-label="Catégorie">${p.categorie}</td>
    <td data-label="Prix">${p.prix.toLocaleString("fr-FR")} FCFA</td>
    <td data-label="Disponible">
      <button class="btn-dispo ${p.disponible ? 'oui' : 'non'}"
        onclick="toggleDispo(${p.id}, ${p.disponible})">
        ${p.disponible ? '✅ Disponible' : '❌ Indisponible'}
      </button>
    </td>
    <td data-label="Actions" style="display:flex;gap:0.5rem;align-items:center">
      <button class="btn-modifier" onclick="ouvrirModifier(${p.id})">&#9998; Modifier</button>
      <button class="btn-supprimer" onclick="supprimerProduit(${p.id})">&#128465; Supprimer</button>
    </td>
  </tr>
`).join("");
}
    document.addEventListener("DOMContentLoaded", chargerProduits);
  </script>

</body>
</html>
